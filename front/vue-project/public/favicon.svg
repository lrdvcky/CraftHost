<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- фон тёмный, чтобы блок не сливался в светлых вкладках -->
  <rect width="64" height="64" rx="10" fill="#0c1117"/>
  <!-- верхняя травяная плоскость -->
  <g>
    <rect x="10" y="12" width="44" height="18" fill="#0fa84a"/>
    <!-- травяные пятна светлее -->
    <rect x="14" y="14" width="6" height="4" fill="#1ed760"/>
    <rect x="24" y="16" width="4" height="4" fill="#1ed760"/>
    <rect x="36" y="14" width="8" height="4" fill="#1ed760"/>
    <rect x="46" y="20" width="4" height="4" fill="#1ed760"/>
    <rect x="20" y="24" width="4" height="3" fill="#1ed760"/>
    <rect x="34" y="22" width="6" height="3" fill="#1ed760"/>
  </g>
  <!-- кромка дёрна -->
  <rect x="10" y="28" width="44" height="3" fill="#0a7a36"/>
  <!-- земляная часть -->
  <g>
    <rect x="10" y="31" width="44" height="21" fill="#7a4a2a"/>
    <rect x="14" y="34" width="6" height="3" fill="#8a5530"/>
    <rect x="26" y="33" width="8" height="2" fill="#8a5530"/>
    <rect x="44" y="36" width="6" height="3" fill="#8a5530"/>
    <rect x="18" y="42" width="4" height="4" fill="#5e3a22"/>
    <rect x="32" y="44" width="6" height="3" fill="#5e3a22"/>
    <rect x="46" y="46" width="4" height="3" fill="#5e3a22"/>
  </g>
  <!-- зелёный акцент-обводка -->
  <rect x="9" y="11" width="46" height="42" fill="none" stroke="#00e676" stroke-width="2"/>
</svg>
